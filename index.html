<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本情報技術者 暗記フラッシュカード (JSON Data)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #3700b3;
            --accent-desc: #ffb74d;
            --accent-term: #64b5f6;
            --success-color: #03dac6;
            --error-color: #ff8a80;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
            margin: 20px 0;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #ffffff;
        }
        p {
            color: #b0b0b0;
            font-size: 0.95rem;
            margin: 15px 0 8px 0;
        }
        .status-message {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        /* 設定グループのスタイル */
        .setting-group {
            background-color: #151515;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #2c2c2c;
            text-align: left;
        }
        .setting-group p {
            margin-top: 0;
            font-weight: bold;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* 選択肢のレイアウト */
        .radio-set {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }
        .mode-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        .mode-label input {
            cursor: pointer;
        }
        .mode-label:disabled, .mode-label input:disabled {
            color: #555;
            cursor: not-allowed;
        }
        
        /* 数値入力エリア */
        .input-set {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.95rem;
        }
        .input-set input[type="number"] {
            width: 70px;
            padding: 8px;
            font-size: 1rem;
            background-color: #2c2c2c;
            border: 2px solid #444;
            border-radius: 8px;
            color: #ffffff;
            text-align: center;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #4f11e6;
        }
        .btn:disabled {
            background-color: #555555;
            color: #aaaaaa;
            cursor: not-allowed;
        }
        .btn-reset {
            background-color: #424242;
            font-size: 0.75rem;
            padding: 4px 10px;
            margin-top: 0;
            border-radius: 4px;
        }
        .btn-reset:hover {
            background-color: #616161;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        
        /* 進捗バー関連 */
        .progress-container {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 5px;
        }
        .total-progress-bar {
            width: 100%;
            height: 4px;
            background-color: #2c2c2c;
            border-radius: 2px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .total-progress-fill {
            height: 100%;
            background-color: #9575cd;
            width: 0%;
            transition: width 0.3s ease;
        }
        .timer-bar {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .timer-progress {
            height: 100%;
            background-color: var(--success-color);
            width: 100%;
        }
        
        /* カードエリア */
        .card-box {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #2c2c2c;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            background-color: #151515;
            box-sizing: border-box;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .card-box:hover {
            border-color: #444;
        }
        .label {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .label.description {
            background-color: rgba(255, 183, 77, 0.15);
            color: var(--accent-desc);
            border: 1px solid var(--accent-desc);
        }
        .label.term {
            background-color: rgba(100, 181, 246, 0.15);
            color: var(--accent-term);
            border: 1px solid var(--accent-term);
        }
        .content {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.6;
            color: #ffffff;
            word-break: break-all;
        }
        
        /* コントロールボタン群 */
        .control-btns {
            display: flex;
            justify-content: space-around;
            gap: 12px;
            margin-bottom: 12px;
        }
        .btn-secondary {
            background-color: #333333;
            flex: 1;
        }
        .btn-secondary:hover {
            background-color: #444444;
        }
        .btn-action {
            flex: 1;
            padding: 10px;
            font-size: 1rem;
        }
        .btn-know {
            background-color: #1b5e20;
        }
        .btn-know:hover {
            background-color: #2e7d32;
        }
        .btn-yet {
            background-color: #b71c1c;
        }
        .btn-yet:hover {
            background-color: #c62828;
        }
        .manual-tip {
            font-size: 0.8rem;
            color: #777;
            margin-top: -15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setupScreen" class="screen active">
        <h1>暗記フラッシュカード</h1>
        <div id="statusMsg" class="status-message">データを読み込み中...</div>
        
        <div class="setting-group">
            <p>
                <span>対象カードの選択</span>
                <button class="btn btn-reset" onclick="resetHistory()">履歴をリセット</button>
            </p>
            <div class="radio-set">
                <label class="mode-label"><input type="radio" name="targetGroup" value="all" checked> <span id="lblAll">すべて (0)</span></label>
                <label class="mode-label" id="optYet"><input type="radio" name="targetGroup" value="yet"> <span id="lblYet" style="color:var(--error-color)">まだ (0)</span></label>
                <label class="mode-label" id="optKnow"><input type="radio" name="targetGroup" value="know"> <span id="lblKnow" style="color:var(--success-color)">覚えた (0)</span></label>
                <label class="mode-label" id="optUnseen"><input type="radio" name="targetGroup" value="unseen"> <span id="lblUnseen">未選択 (0)</span></label>
            </div>
        </div>

        <div class="setting-group">
            <p>出題モード</p>
            <div class="radio-set">
                <label class="mode-label"><input type="radio" name="quizMode" value="descToTerm" checked> 解説 ⇒ 用語</label>
                <label class="mode-label"><input type="radio" name="quizMode" value="termToDesc"> 用語 ⇒ 解説</label>
                <label class="mode-label"><input type="radio" name="quizMode" value="descOnly"> 解説のみ</label>
                <label class="mode-label"><input type="radio" name="quizMode" value="termOnly"> 用語のみ</label>
            </div>
        </div>

        <div class="setting-group">
            <p>出題順</p>
            <div class="radio-set">
                <label class="mode-label"><input type="radio" name="orderMode" value="shuffle" checked> シャッフル</label>
                <label class="mode-label"><input type="radio" name="orderMode" value="forward"> 順送り</label>
                <label class="mode-label"><input type="radio" name="orderMode" value="backward"> 逆送り</label>
            </div>
        </div>

        <div class="setting-group">
            <p>タイマー設定 (0秒で手動めくり)</p>
            <div class="input-set" id="timerInputs">
                <div id="p1TimeWrap">
                    <span id="p1TimeLabel">問題側:</span>
                    <input type="number" id="intervalInputP1" value="5" min="0" max="60"> 秒
                </div>
                <div id="p2TimeWrap">
                    <span id="p2TimeLabel">答え側:</span>
                    <input type="number" id="intervalInputP2" value="3" min="0" max="60"> 秒
                </div>
            </div>
        </div>

        <button class="btn" id="startBtn" onclick="startFlashcard()" disabled>スタート</button>
    </div>

    <div id="cardScreen" class="screen">
        <div class="progress-container">
            <div id="progressText">0 / 0</div>
            <div id="statusLabelText" style="font-size:0.85rem; color:#aaa;"></div>
        </div>
        <div class="total-progress-bar">
            <div id="totalProgressFill" class="total-progress-fill"></div>
        </div>
        <div class="timer-bar">
            <div id="timerProgress" class="timer-progress"></div>
        </div>
        
        <div class="manual-tip" id="manualTip">💡 カードをクリックすると次へ進めます</div>

        <div class="card-box" onclick="handleCardClick()">
            <div id="cardLabel" class="label"></div>
            <div id="cardContent" class="content"></div>
        </div>

        <div class="control-btns" id="actionBtnArea">
            <button class="btn btn-action btn-yet" onclick="markCard(false)">まだ</button>
            <button class="btn btn-action btn-know" onclick="markCard(true)">覚えた</button>
        </div>

        <div class="control-btns">
            <button class="btn btn-secondary" onclick="pauseOrResume()" id="pauseBtn">一時停止</button>
            <button class="btn btn-secondary" onclick="stopFlashcard()">終了</button>
        </div>
    </div>
</div>

<script>
    let masterCards = [];     // 全元のデータ
    let currentPool = [];     // 今回再生する対象カードの配列
    let currentIndex = 0;
    let isShowingAnswer = false;
    
    let intervalTimeP1 = 5000;
    let intervalTimeP2 = 3000;
    let currentInterval = 5000;
    
    let timerId = null;
    let animationId = null;
    let startTime = 0;
    let pausedTime = 0;
    let isPaused = false;
    let isManualMode = false;

    let currentMode = "descToTerm"; 
    let currentOrder = "shuffle";

    // 履歴管理用のオブジェクト (Key: 用語の文字列, Value: 'know' または 'yet')
    let cardHistory = {};

    const setupScreen = document.getElementById('setupScreen');
    const cardScreen = document.getElementById('cardScreen');
    const intervalInputP1 = document.getElementById('intervalInputP1');
    const intervalInputP2 = document.getElementById('intervalInputP2');
    const progressText = document.getElementById('progressText');
    const statusLabelText = document.getElementById('statusLabelText');
    const totalProgressFill = document.getElementById('totalProgressFill');
    const timerProgress = document.getElementById('timerProgress');
    const cardLabel = document.getElementById('cardLabel');
    const cardContent = document.getElementById('cardContent');
    const pauseBtn = document.getElementById('pauseBtn');
    const startBtn = document.getElementById('startBtn');
    const statusMsg = document.getElementById('statusMsg');
    const actionBtnArea = document.getElementById('actionBtnArea');
    const manualTip = document.getElementById('manualTip');
    const p2TimeWrap = document.getElementById('p2TimeWrap');
    const p1TimeLabel = document.getElementById('p1TimeLabel');

    // モード選択に応じてタイマー表示を調整
    document.querySelectorAll('input[name="quizMode"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === "descOnly" || e.target.value === "termOnly") {
                p2TimeWrap.style.display = "none";
                p1TimeLabel.innerText = "切り替え秒数:";
            } else {
                p2TimeWrap.style.display = "inline-block";
                p1TimeLabel.innerText = "問題側:";
            }
        });
    });

    // ローカルストレージから履歴を読み込んでラベルの件数を更新
    function loadHistoryAndRefreshLabels() {
        const saved = localStorage.getItem('flashcard_history_v2');
        if (saved) {
            try { cardHistory = JSON.parse(saved); } catch(e) { cardHistory = {}; }
        } else {
            cardHistory = {};
        }

        if (masterCards.length === 0) return;

        let countAll = masterCards.length;
        let countYet = 0;
        let countKnow = 0;
        let countUnseen = 0;

        masterCards.forEach(card => {
            const status = cardHistory[card.term];
            if (status === 'know') countKnow++;
            else if (status === 'yet') countYet++;
            else countUnseen++;
        });

        document.getElementById('lblAll').innerText = `すべて (${countAll})`;
        document.getElementById('lblYet').innerText = `まだ (${countYet})`;
        document.getElementById('lblKnow').innerText = `覚えた (${countKnow})`;
        document.getElementById('lblUnseen').innerText = `未選択 (${countUnseen})`;

        // 件数が0の選択肢を無効化・有効化
        document.querySelector('input[name="targetGroup"][value="yet"]').disabled = (countYet === 0);
        document.querySelector('input[name="targetGroup"][value="know"]').disabled = (countKnow === 0);
        document.querySelector('input[name="targetGroup"][value="unseen"]').disabled = (countUnseen === 0);
    }

    // 履歴を全リセット
    function resetHistory() {
        if(confirm("仕分けた履歴をすべて消去して初期状態に戻しますか？")) {
            localStorage.removeItem('flashcard_history_v2');
            loadHistoryAndRefreshLabels();
            document.querySelector('input[name="targetGroup"][value="all"]').checked = true;
        }
    }

    // data.json 読み込み
    async function loadExternalJSON() {
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error('data.json の読み込みに失敗しました。');
            
            masterCards = await response.json();
            masterCards = masterCards.filter(card => card.term && card.desc);

            if (masterCards.length > 0) {
                statusMsg.style.color = '#03dac6';
                statusMsg.innerText = `データを正常に読み込みました (${masterCards.length}問)`;
                startBtn.disabled = false;
                loadHistoryAndRefreshLabels();
            } else {
                statusMsg.innerText = 'データが空、または形式が正しくありません。';
            }
        } catch (error) {
            statusMsg.innerText = 'エラー: data.json が見つからないか、反映待ちです。';
            console.error(error);
        }
    }

    window.addEventListener('DOMContentLoaded', loadExternalJSON);

    function changeScreen(fromScreen, toScreen) {
        fromScreen.classList.remove('active');
        toScreen.classList.add('active');
    }

    // 再生スタート
    function startFlashcard() {
        if (masterCards.length === 0) return;
        
        currentMode = document.querySelector('input[name="quizMode"]:checked').value;
        currentOrder = document.querySelector('input[name="orderMode"]:checked').value;
        const targetGroup = document.querySelector('input[name="targetGroup"]:checked').value;
        
        // 対象カードのフィルタリング
        if (targetGroup === 'all') {
            currentPool = [...masterCards];
        } else if (targetGroup === 'yet') {
            currentPool = masterCards.filter(c => cardHistory[c.term] === 'yet');
        } else if (targetGroup === 'know') {
            currentPool = masterCards.filter(c => cardHistory[c.term] === 'know');
        } else if (targetGroup === 'unseen') {
            currentPool = masterCards.filter(c => !cardHistory[c.term]);
        }

        if (currentPool.length === 0) {
            alert('選択された対象のカードがありません。');
            return;
        }
        
        const sec1 = parseInt(intervalInputP1.value, 10) || 0;
        const sec2 = parseInt(intervalInputP2.value, 10) || 0;
        
        intervalTimeP1 = sec1 * 1000;
        intervalTimeP2 = sec2 * 1000;
        
        if (currentMode === "descOnly" || currentMode === "termOnly") {
            isManualMode = (sec1 === 0);
        } else {
            isManualMode = (sec1 === 0 || sec2 === 0);
        }

        applyOrder();

        currentIndex = 0;
        isShowingAnswer = false;
        isPaused = false;
        
        pauseBtn.innerText = "一時停止";
        pauseBtn.style.display = isManualMode ? "none" : "inline-block";
        manualTip.style.display = isManualMode ? "block" : "none";

        changeScreen(setupScreen, cardScreen);
        showCard();
    }

    // 並び替え適用
    function applyOrder() {
        if (currentOrder === "shuffle") {
            for (let i = currentPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentPool[i], currentPool[j]] = [currentPool[j], currentPool[i]];
            }
        } else if (currentOrder === "backward") {
            currentPool.reverse();
        }
    }

    // 表示処理
    function showCard() {
        if (currentIndex >= currentPool.length) {
            handlePoolComplete();
            return;
        }

        progressText.innerText = `${currentIndex + 1} / ${currentPool.length}`;
        
        // 現在のカードの現在の保存ステータスを画面右上に小さく表示
        const currentCard = currentPool[currentIndex];
        const curStatus = cardHistory[currentCard.term];
        if(curStatus === 'know') statusLabelText.innerText = "状態: 覚えた";
        else if(curStatus === 'yet') statusLabelText.innerText = "状態: まだ";
        else statusLabelText.innerText = "状態: 未選択";

        const totalPercent = (currentIndex / currentPool.length) * 100;
        totalProgressFill.style.width = `${totalPercent}%`;

        if (currentMode === "descToTerm") {
            actionBtnArea.style.display = "none";
            if (!isShowingAnswer) {
                cardLabel.innerText = "解説";
                cardLabel.className = "label description";
                cardContent.innerText = currentCard.desc;
                currentInterval = intervalTimeP1;
            } else {
                cardLabel.innerText = "用語";
                cardLabel.className = "label term";
                cardContent.innerText = currentCard.term;
                currentInterval = intervalTimeP2;
                actionBtnArea.style.display = "flex";
            }
        } else if (currentMode === "termToDesc") {
            actionBtnArea.style.display = "none";
            if (!isShowingAnswer) {
                cardLabel.innerText = "用語";
                cardLabel.className = "label term";
                cardContent.innerText = currentCard.term;
                currentInterval = intervalTimeP1;
            } else {
                cardLabel.innerText = "解説";
                cardLabel.className = "label description";
                cardContent.innerText = currentCard.desc;
                currentInterval = intervalTimeP2;
                actionBtnArea.style.display = "flex";
            }
        } else if (currentMode === "descOnly") {
            cardLabel.innerText = "解説（確認モード）";
            cardLabel.className = "label description";
            cardContent.innerText = currentCard.desc;
            currentInterval = intervalTimeP1;
            actionBtnArea.style.display = "flex";
        } else if (currentMode === "termOnly") {
            cardLabel.innerText = "用語（確認モード）";
            cardLabel.className = "label term";
            cardContent.innerText = currentCard.term;
            currentInterval = intervalTimeP1;
            actionBtnArea.style.display = "flex";
        }

        if (!isManualMode) {
            startTimer();
        } else {
            timerProgress.style.width = '100%';
        }
    }

    function startTimer() {
        cancelAnimationFrame(animationId);
        clearTimeout(timerId);
        
        startTime = performance.now();
        if (isPaused) {
            startTime -= pausedTime;
            isPaused = false;
        }

        function updateProgressBar(now) {
            const elapsed = now - startTime;
            const remainingRatio = Math.max(0, 100 - (elapsed / currentInterval) * 100);
            timerProgress.style.width = remainingRatio + '%';

            if (elapsed < currentInterval) {
                animationId = requestAnimationFrame(updateProgressBar);
            }
        }
        animationId = requestAnimationFrame(updateProgressBar);

        timerId = setTimeout(() => {
            advanceCardFlow();
        }, currentInterval);
    }

    function advanceCardFlow() {
        if (currentMode === "descOnly" || currentMode === "termOnly") {
            currentIndex++;
            showCard();
        } else {
            if (!isShowingAnswer) {
                isShowingAnswer = true;
                showCard();
            } else {
                isShowingAnswer = false;
                currentIndex++;
                showCard();
            }
        }
    }

    function handleCardClick() {
        cancelAnimationFrame(animationId);
        clearTimeout(timerId);
        advanceCardFlow();
    }

    // 「覚えた」「まだ」の判定をローカルストレージへ保存する
    function markCard(isKnown) {
        cancelAnimationFrame(animationId);
        clearTimeout(timerId);

        const currentCard = currentPool[currentIndex];
        
        // 履歴を更新して即座に保存
        cardHistory[currentCard.term] = isKnown ? 'know' : 'yet';
        localStorage.setItem('flashcard_history_v2', JSON.stringify(cardHistory));

        if (currentMode === "descOnly" || currentMode === "termOnly" || isShowingAnswer) {
            isShowingAnswer = false;
            currentIndex++;
        } else {
            isShowingAnswer = true;
        }
        showCard();
    }

    // 終了時の処理
    function handlePoolComplete() {
        totalProgressFill.style.width = '100%';
        cancelAnimationFrame(animationId);
        clearTimeout(timerId);
        // ポップアップを挟まずに、自動で設定画面へ戻る
        stopFlashcard();
    }

    function pauseOrResume() {
        if (isManualMode) return;
        if (!isPaused) {
            isPaused = true;
            cancelAnimationFrame(animationId);
            clearTimeout(timerId);
            pausedTime = performance.now() - startTime;
            pauseBtn.innerText = "再開";
        } else {
            isPaused = false;
            pauseBtn.innerText = "一時停止";
            startTimer();
        }
    }

    function stopFlashcard() {
        cancelAnimationFrame(animationId);
        clearTimeout(timerId);
        loadHistoryAndRefreshLabels(); // 設定画面に戻るタイミングで件数表示をリフレッシュ
        changeScreen(cardScreen, setupScreen);
    }
</script>

</body>
</html>
